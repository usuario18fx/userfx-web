<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UserFx — Keep it lit</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #ff0055;
      --accent: #00f2ff;
      --bg: #050505;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-strong: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text-soft: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: "Outfit", sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 0, 85, 0.10) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
      z-index: -1;
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 5%;
      backdrop-filter: blur(10px);
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--glass);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-text .name {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(45deg, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(255, 0, 85, 0.3);
    }

    .tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      opacity: 0.9;
    }

    .actions a {
      text-decoration: none;
      color: white;
      background: var(--glass);
      padding: 0.7rem 1.2rem;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.25s ease;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .actions a:hover {
      background: white;
      color: black;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .scene {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .content {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .left {
      max-width: 460px;
    }

    .sigil {
      font-size: 6rem;
      margin: 0 0 1rem;
      line-height: 1;
      filter: drop-shadow(0 0 15px var(--primary));
      animation: float 4s ease-in-out infinite;
    }

    .hint {
      margin: 0 0 1rem;
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .desc {
      margin: 0;
      opacity: 0.78;
      font-size: 1rem;
      line-height: 1.6;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .right {
      display: flex;
      justify-content: center;
    }

    .galeria-book-3d {
      width: 320px;
      height: 470px;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease;
    }

    .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 18px;
      background: linear-gradient(
        180deg,
        rgba(5, 5, 5, 0.32) 0%,
        rgba(5, 5, 5, 0.74) 100%
      );
      z-index: 5;
    }

    .lock {
      width: 52px;
      height: 52px;
      background: var(--primary);
      mask: url("https://raw.githubusercontent.com/google/material-design-icons/master/src/action/lock/materialicons/24px.svg") no-repeat center;
      -webkit-mask: url("https://raw.githubusercontent.com/google/material-design-icons/master/src/action/lock/materialicons/24px.svg") no-repeat center;
      animation: pulse 2s infinite;
      margin-bottom: 10px;
    }

    .lock-title {
      margin: 8px 0 0;
      font-size: 0.85rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.72; }
      100% { transform: scale(1); opacity: 1; }
    }

    .unlock-box {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      width: 100%;
      max-width: 270px;
    }

    .unlock-codeRow {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .unlock-input {
      min-height: 52px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
      text-align: center;
      font-size: 14px;
      text-transform: uppercase;
      font-family: "Outfit", sans-serif;
    }

    .unlock-input:focus {
      border-color: rgba(0, 242, 255, 0.42);
      box-shadow: 0 0 0 3px rgba(0, 242, 255, 0.08);
    }

    .unlock-input--prefix {
      flex: 1 1 auto;
      opacity: 0.9;
    }

    .unlock-input--suffix {
      width: 90px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .unlock-input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .lock-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      width: 100%;
      flex-wrap: wrap;
    }

    .unlock-btn {
      min-height: 48px;
      padding: 12px 18px;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: "Outfit", sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .unlock-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(255,255,255,0.14);
    }

    .unlock-btn:active {
      transform: translateY(0);
    }

    #unlockBtn {
      background: #fff;
      color: #000;
      min-width: 190px;
    }

    .zoom-btn {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      text-decoration: none;
      min-width: 150px;
    }

    .zoom-btn:hover {
      border-color: rgba(0, 242, 255, 0.45);
      box-shadow: 0 10px 24px rgba(0, 242, 255, 0.12);
    }

    .unlock-help {
      margin: -2px 0 0;
      font-size: 0.88rem;
      color: var(--text-soft);
      text-align: center;
    }

    .unlock-msg {
      min-height: 20px;
      margin: 0;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      text-align: center;
    }

    .hand-hint {
      position: absolute;
      bottom: 20px;
      font-size: 1.5rem;
      animation: bounce 2s infinite;
      pointer-events: none;
      z-index: 1;
    }

    .footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 1px;
      opacity: 0.6;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 1.15rem 5%;
      }

      .content {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 2.5rem;
      }

      .left {
        max-width: none;
      }

      .sigil {
        font-size: 4.5rem;
      }

      .galeria-book-3d {
        width: min(320px, 92vw);
        height: 460px;
      }
    }

    @media (max-width: 480px) {
      .actions a {
        padding: 0.65rem 1rem;
        font-size: 0.85rem;
      }

      .unlock-codeRow {
        flex-direction: column;
      }

      .unlock-input--prefix,
      .unlock-input--suffix {
        width: 100%;
      }

      #unlockBtn,
      .zoom-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-text">
        <div class="name">Fx 🜲</div>
        <div class="tag">Exclusive Space</div>
      </div>
    </div>

    <nav class="actions">
      <a href="https://t.me/User18fx" target="_blank" rel="noopener noreferrer">
        Contact Me ⌯⌲
      </a>
    </nav>
  </header>

  <main class="scene" id="galeria">
    <section class="content">
      <div class="left">
        <h1 class="sigil">Ŧҳ</h1>
        <p class="hint">PREMIUM CONTENT ACCESS</p>
        <p class="desc">
          Keep it lit, keep it real. Explore the visual experience.
        </p>
      </div>

      <div class="right">
        <div class="galeria-book-3d" id="book">
          <div class="lock-overlay" id="lockOverlay">
            <div class="lock"></div>
            <p class="lock-title">LOCKED</p>

            <div id="unlockBox" class="unlock-box">
              <div class="unlock-codeRow">
                <input
                  id="accessCodePrefix"
                  class="unlock-input unlock-input--prefix"
                  type="text"
                  value="FX-USER01-"
                  readonly
                />
                <input
                  id="accessCodeSuffix"
                  class="unlock-input unlock-input--suffix"
                  type="text"
                  maxlength="4"
                  placeholder="AX01"
                  autocomplete="off"
                />
              </div>

              <div class="lock-actions">
                <button id="unlockBtn" class="unlock-btn" type="button">
                  UNLOCK ALBUM
                </button>

                <a
                  id="zoomBtn"
                  class="unlock-btn zoom-btn"
                  href="https://t.me/User18Fx_bot?start=videocall"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  📹 ZOOM
                </a>
              </div>

              <p class="unlock-help">Enter the last 4 characters.</p>
              <p id="unlockMsg" class="unlock-msg"></p>
            </div>
          </div>

          <div class="hand-hint">👆</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    USER | <span style="color: var(--primary);">𝐅ㄨ🜲</span> |
    <span id="year"></span> © ALL RIGHTS RESERVED
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const book = document.getElementById("book");

    if (book) {
      book.addEventListener("mousemove", (e) => {
        const rect = book.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const xc = rect.width / 2;
        const yc = rect.height / 2;

        const dx = x - xc;
        const dy = y - yc;

        book.style.transform =
          `perspective(1000px) rotateY(${dx / 14}deg) rotateX(${-dy / 14}deg)`;
      });

      book.addEventListener("mouseleave", () => {
        book.style.transform =
          "perspective(1000px) rotateY(0deg) rotateX(0deg)";
      });
    }
  </script>

  <script type="module" src="./app.js"></script>
</body>
</html>
