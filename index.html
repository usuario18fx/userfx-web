<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>— UserFx — Keep it lit </title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --primary: #ff0055; /* Color de acento */
      --accent: #00f2ff;
      --bg: #050505;
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Fondo de partículas Premium */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255, 0, 85, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
      z-index: -1;
    }

    /* Header con efecto Blur */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 5%;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--glass);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-text .name {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(45deg, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(255, 0, 85, 0.3);
    }

    .tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      opacity: 0.8;
    }

    /* Botón estilo "Cyber" */
    .actions a {
      text-decoration: none;
      color: white;
      background: var(--glass);
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .actions a:hover {
      background: white;
      color: black;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    /* Sección Principal */
    .scene {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      max-width: 1100px;
      align-items: center;
    }

    .sigil {
      font-size: 6rem;
      margin: 0;
      line-height: 1;
      filter: drop-shadow(0 0 15px var(--primary));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    /* El Libro/Contenedor 3D mejorado */
    .galeria-book-3d {
      width: 300px;
      height: 400px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
    }

    .lock-overlay {
      text-align: center;
      transition: transform 0.5s ease;
    }

    .lock {
      width: 50px;
      height: 50px;
      background: var(--primary);
      mask: url('https://raw.githubusercontent.com/google/material-design-icons/master/src/action/lock/materialicons/24px.svg') no-repeat center;
      -webkit-mask: url('https://raw.githubusercontent.com/google/material-design-icons/master/src/action/lock/materialicons/24px.svg') no-repeat center;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 1px;
      opacity: 0.6;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .content { grid-template-columns: 1fr; text-align: center; }
      .sigil { font-size: 4rem; }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-text">
        <div class="name">Fx 🜲</div>
        <div class="tag">Exclusive Space</div>
      </div>
    </div>

    <nav class="actions">
      <a href="https://t.me/User18fx" target="_blank">Contact Me ⌯⌲</a>
    </nav>
  </header>

  <main class="scene" id="galeria">
    <section class="content">
      <div class="left">
        <h1 class="sigil">Ŧҳ</h1>
        <p class="hint" style="color: var(--accent); font-weight: 500;">PREMIUM CONTENT ACCESS</p>
        <p style="opacity: 0.7;">Keep it lit, keep it real. Explore the visual experience.</p>
      </div>

      <div class="right">
        <div class="galeria-book-3d" id="book">
          <div class="lock-overlay" id="lockOverlay">
            <div id="unlockBox" class="unlock-box">
  <input
    id="accessCodeInput"
    class="unlock-input"
    type="text"
    placeholder="Pega tu código FX"
    autocomplete="off"
  />
  <button id="unlockBtn" class="unlock-btn" type="button">
    Desbloquear
  </button>
  <p id="unlockMsg" class="unlock-msg"></p>
</div>
            <div class="lock"></div>
            <p style="margin-top: 15px; font-size: 0.8rem; letter-spacing: 2px;">LOCKED</p>
          </div>
          <div class="hand-hint" style="position: absolute; bottom: 20px; font-size: 1.5rem; animation: bounce 2s infinite;">👆</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    USER | <span style="color: var(--primary);">𝐅ㄨ🜲</span> | <span id="year"></span> © ALL RIGHTS RESERVED
  </footer>

  <script>
    // Actualizar año automáticamente
    document.getElementById('year').textContent = new Date().getFullYear();

    // Efecto de inclinación 3D en el "Libro"
    const book = document.getElementById('book');
    book.addEventListener('mousemove', (e) => {
      const rect = book.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const xc = rect.width / 2;
      const yc = rect.height / 2;
      
      const dx = x - xc;
      const dy = y - yc;
      
      book.style.transform = `perspective(1000px) rotateY(${dx/10}deg) rotateX(${-dy/10}deg)`;
    });

    book.addEventListener('mouseleave', () => {
      book.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
    });
  </script>
</body>
</html>
