<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UserFx — Keep it lit</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #ff0055;
      --accent: #00f2ff;
      --bg: #050505;
      --glass: rgba(255, 255, 255, 0.05);
      --text-soft: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: "Outfit", sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 0, 85, 0.10) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
      z-index: -1;
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 5%;
      backdrop-filter: blur(10px);
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--glass);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-text .name {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(45deg, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(255, 0, 85, 0.3);
    }

    .tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      opacity: 0.9;
    }

    .actions a {
      text-decoration: none;
      color: white;
      background: var(--glass);
      padding: 0.7rem 1.2rem;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.25s ease;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .actions a:hover {
      background: white;
      color: black;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .scene {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .content {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .left {
      max-width: 460px;
    }

    .sigil {
      font-size: 6rem;
      margin: 0 0 1rem;
      line-height: 1;
      filter: drop-shadow(0 0 15px var(--primary));
      animation: float 4s ease-in-out infinite;
    }

    .hint {
      margin: 0 0 1rem;
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .desc {
      margin: 0;
      opacity: 0.78;
      font-size: 1rem;
      line-height: 1.6;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .right {
      display: flex;
      justify-content: center;
    }

    .galeria-book-3d {
      width: 320px;
      height: 470px;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease;
    }

    .lock-overlay {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 24px;
      z-index: 5;
    }

    .card-bg-photo {
      position: absolute;
      inset: 0;
      background: url("/assets/user-photo-blur.jpg") center/cover no-repeat;
      transform: scale(1.08);
      filter: blur(16px) saturate(1.05) brightness(0.62);
    }

    .card-darken {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5,5,5,0.28) 0%, rgba(5,5,5,0.72) 100%);
    }

    .lock-content {
      position: relative;
      z-index: 2;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 22px;
      text-align: center;
    }

    .lock-emoji {
      font-size: 2.6rem;
      line-height: 1;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 16px rgba(255, 0, 85, 0.28));
    }

    .lock-title {
      margin: 0 0 28px;
      font-size: 0.92rem;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.95);
    }

    .unlock-box {
      width: 100%;
      max-width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .unlock-help-top,
    .unlock-help-bottom {
      margin: 0;
      font-size: 0.68rem;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      text-align: center;
    }

    .unlock-help-top {
      margin-bottom: 2px;
    }

    .unlock-codeText {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }

    .unlock-prefix-text {
      opacity: 0.72;
    }

    .unlock-suffix-text {
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .unlock-hintRow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: -6px;
      margin-bottom: -6px;
    }

    .unlock-arrow {
      font-size: 1.15rem;
      color: rgba(255, 255, 255, 0.65);
      animation: unlockArrowPulse 1.6s ease-in-out infinite;
    }

    @keyframes unlockArrowPulse {
      0%, 100% { transform: translateX(0) translateY(0); opacity: 0.75; }
      50% { transform: translateX(4px) translateY(2px); opacity: 1; }
    }

    .unlock-input-minimal {
      width: 120px;
      border: 0;
      border-bottom: 2px solid rgba(255,255,255,0.28);
      background: transparent;
      color: #fff;
      font-family: "Outfit", sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      padding: 8px 0 10px;
    }

    .unlock-input-minimal::placeholder {
      color: rgba(255,255,255,0.24);
      letter-spacing: 0.18em;
    }

    .unlock-input-minimal:focus {
      border-bottom-color: var(--accent);
    }

    .unlock-label {
      margin: 4px 0 0;
      font-size: 0.92rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
    }

    .unlock-lockBtn {
      width: 82px;
      height: 82px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow:
        0 12px 30px rgba(0,0,0,0.28),
        inset 0 0 0 1px rgba(255,255,255,0.12);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      backdrop-filter: blur(10px);
    }

    .unlock-lockBtn:hover {
      transform: translateY(-2px) scale(1.03);
      background: rgba(255,255,255,0.18);
      box-shadow:
        0 16px 36px rgba(0,0,0,0.34),
        inset 0 0 0 1px rgba(255,255,255,0.16);
    }

    .unlock-msg {
      min-height: 20px;
      margin: 0;
      font-size: 13px;
      color: rgba(255,255,255,0.84);
      text-align: center;
    }

    .footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 1px;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 2.5rem;
      }

      .left {
        max-width: none;
      }

      .sigil {
        font-size: 4.5rem;
      }

      .galeria-book-3d {
        width: min(320px, 92vw);
        height: 460px;
      }
    }

    @media (max-width: 480px) {
      .actions a {
        padding: 0.65rem 1rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-text">
        <div class="name">Fx 🜲</div>
        <div class="tag">Exclusive Space</div>
      </div>
    </div>

    <nav class="actions">
      <a href="https://t.me/User18fx" target="_blank" rel="noopener noreferrer">
        Contact Me ⌯⌲
      </a>
    </nav>
  </header>

  <main class="scene" id="galeria">
    <section class="content">
      <div class="left">
        <h1 class="sigil">Ŧҳ</h1>
        <p class="hint">PREMIUM CONTENT ACCESS</p>
        <p class="desc">
          Keep it lit, keep it real. Explore the visual experience.
        </p>
      </div>

      <div class="right">
        <div class="galeria-book-3d" id="book">
          <div class="lock-overlay" id="lockOverlay">
            <div class="card-bg-photo"></div>
            <div class="card-darken"></div>

            <div class="lock-content">
              <div class="lock-emoji">🔒</div>
              <p class="lock-title">LOCKED</p>

              <div id="unlockBox" class="unlock-box">
                <p class="unlock-help-top">Enter the last 4 characters.</p>

                <p class="unlock-codeText">
                  <span class="unlock-prefix-text">FX-USER01-</span>
                  <strong class="unlock-suffix-text">AX01</strong>
                </p>

                <div class="unlock-hintRow">
                  <span class="unlock-arrow">↙</span>
                </div>

                <input
                  id="accessCodeSuffix"
                  class="unlock-input-minimal"
                  type="text"
                  maxlength="4"
                  placeholder="____"
                  autocomplete="off"
                />

                <p class="unlock-help-bottom">put here</p>

                <p class="unlock-label">UNLOCK ALBUM</p>

                <button id="unlockBtn" class="unlock-lockBtn" type="button" aria-label="Unlock album">
                  🔓
                </button>

                <p id="unlockMsg" class="unlock-msg"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    USER | <span style="color: var(--primary);">𝐅ㄨ🜲</span> |
    <span id="year"></span> © ALL RIGHTS RESERVED
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const book = document.getElementById("book");

    if (book) {
      book.addEventListener("mousemove", (e) => {
        const rect = book.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const xc = rect.width / 2;
        const yc = rect.height / 2;

        const dx = x - xc;
        const dy = y - yc;

        book.style.transform =
          `perspective(1000px) rotateY(${dx / 14}deg) rotateX(${-dy / 14}deg)`;
      });

      book.addEventListener("mouseleave", () => {
        book.style.transform =
          "perspective(1000px) rotateY(0deg) rotateX(0deg)";
      });
    }
  </script>

  <script type="module" src="./app.js"></script>
</body>
</html>
